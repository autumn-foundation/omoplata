name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  # P9 — Dynamic validation over static omniscience (design doc §3 / §4).
  # This job makes the repository's own CI a *dynamic validator*: it proves both
  # sides of `omo merge-file --validate` on a clean, kernel-admitted merge —
  # a passing validator accepts (exit 0), a failing validator demotes the merge
  # to a Tier-3 semantic conflict (exit non-zero). This is the concrete
  # realization of "acceptance is provisional pending dynamic validation".
  dynamic-validation:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p omoplata-cli
      - name: P9 — passing and failing (demotion) validation paths
        run: |
          set -euo pipefail
          bin=target/debug/omo
          work="$(mktemp -d)"
          # A clean, disjoint (line-level) three-way merge the kernel admits.
          printf 'a\nb\nc\nd\n' > "$work/base.txt"
          printf 'A\nb\nc\nd\n' > "$work/left.txt"
          printf 'a\nb\nc\nD\n' > "$work/right.txt"

          echo "== passing validator (true) must accept: exit 0 =="
          "$bin" merge-file "$work/base.txt" "$work/left.txt" "$work/right.txt" --validate 'true'

          echo "== failing validator (false) must demote to a semantic conflict: non-zero =="
          # `if` swallows the expected non-zero exit so it does not fail the job.
          if "$bin" merge-file "$work/base.txt" "$work/left.txt" "$work/right.txt" --validate 'false'; then
            echo "expected demotion to a non-zero exit, but the command succeeded"
            exit 1
          fi

          echo "dynamic-validation: both P9 paths verified"

  # R1b — Verus machine-checked algebra invariants (design doc §6).
  # This job builds the Verus toolchain from source and machine-checks the
  # verified model in `verus/` (I1b diff round-trip; I10 disjoint commutation).
  #
  # It is DELIBERATELY isolated: no `needs:` and nothing `needs:` it, so a Verus
  # regression never gates build/test/dynamic-validation. It is also SLOW —
  # building Verus with `vargo build --release` takes ~6-10 min on a GH runner —
  # which is why it is a separate, non-blocking job. The `verus/` directory is
  # outside the cargo workspace, so plain `cargo build --all` never touches it.
  #
  # Toolchain pins: Verus 0.2026.07.21.1beb0fa, Z3 4.12.5 (installed from PyPI,
  # which ships the exact pinned z3 binary — no GitHub-release download needed),
  # Rust 1.96.0 (from Verus's rust-toolchain.toml).
  verus-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone Verus (pinned fork)
        run: git clone --depth 1 https://github.com/madmax983/verus "$RUNNER_TEMP/verus-src"
      - name: Install the toolchain Verus pins
        working-directory: ${{ runner.temp }}/verus-src
        run: |
          set -euo pipefail
          TC=$(grep -o '1\.[0-9]*\.[0-9]*' rust-toolchain.toml | head -1)
          rustup toolchain install "${TC}-x86_64-unknown-linux-gnu"
          rustup component add rustc-dev rustfmt llvm-tools \
            --toolchain "${TC}-x86_64-unknown-linux-gnu"
      - name: Install pinned Z3 from PyPI
        working-directory: ${{ runner.temp }}/verus-src
        run: |
          set -euo pipefail
          ZV=$(grep -oE '4\.[0-9]+\.[0-9]+' source/tools/get-z3.sh | head -1)
          python3 -m pip install --user "z3-solver==${ZV}"
          z3 --version
      - name: Build Verus (vargo build --release, ~6-10 min)
        working-directory: ${{ runner.temp }}/verus-src/source
        run: |
          set -euo pipefail
          unset CARGO_TARGET_DIR
          export VERUS_Z3_PATH="$(command -v z3)"
          source ../tools/activate
          export PATH="$PWD/../tools/vargo/target/release:$PATH"
          vargo build --release
      - name: Machine-check the algebra invariants (I1b, I10)
        run: |
          set -euo pipefail
          VERUS_BIN="$RUNNER_TEMP/verus-src/source/target-verus/release/verus" \
          VERUS_Z3_PATH="$(command -v z3)" \
            ./verus/verify.sh
